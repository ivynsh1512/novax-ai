<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaX AI - Premium Login</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg-dark: #09090b;
      --card-bg: rgba(18, 18, 24, 0.8);
      --border: rgba(255, 255, 255, 0.1);
      --text-muted: #a1a1aa;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg-dark);
      color: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      overflow-y: auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Animated background */
    .bg-animation {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.15) 0%, transparent 40%);
      filter: blur(80px);
      animation: bgPulse 10s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      0% { transform: scale(1); }
      100% { transform: scale(1.1); }
    }

    .auth-container {
      width: 100%;
      max-width: 440px;
      padding: 24px;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .auth-card {
      background: var(--card-bg);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 48px 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-container {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      border-radius: 18px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
    }

    .logo-container i {
      font-size: 28px;
      color: white;
    }

    .brand h2 {
      font-size: 28px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .brand p {
      color: var(--text-muted);
      margin-top: 8px;
      font-size: 15px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 14px;
      pointer-events: none;
    }

    .auth-input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      color: white;
      font-size: 15px;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }

    .auth-input:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 24px;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .divider {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }

    .divider span {
      padding: 0 12px;
    }

    .social-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .btn-social {
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      color: white;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-social:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .btn-social img { width: 18px; }

    .guest-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px dashed rgba(255, 255, 255, 0.2);
      border-radius: 14px;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .guest-btn:hover {
      background: rgba(255, 255, 255, 0.03);
      color: white;
      border-style: solid;
    }

    .auth-footer {
      text-align: center;
      margin-top: 32px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover { text-decoration: underline; }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }

    .forgot-password {
      display: block;
      text-align: right;
      margin-top: -12px;
      margin-bottom: 24px;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
    }

    .forgot-password:hover { color: white; }

    @media (max-width: 480px) {
      .auth-card { padding: 32px 24px; }
      .brand h2 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="bg-animation"></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="brand">
        <div class="logo-container">
          <i class="fas fa-microchip"></i>
        </div>
        <h2>Welcome to NovaX</h2>
        <p>Intelligence redefined.</p>
      </div>

      <div id="error" class="error-msg"></div>

      <div class="form-group">
        <div class="input-wrapper">
          <i class="far fa-envelope"></i>
          <input type="email" id="email" placeholder="Email address" class="auth-input">
        </div>
      </div>

      <div class="form-group">
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="Password" class="auth-input">
        </div>
      </div>

      <a href="#" id="forgotPassword" class="forgot-password">Forgot password?</a>

      <button id="loginBtn" class="btn-primary">Continue</button>

      <div class="divider">
        <span>or</span>
      </div>

      <div class="social-btns">
        <button id="googleBtn" class="btn-social">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#34A853" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#FBBC05" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Google
        </button>
        <button id="signupBtn" class="btn-social">
          <i class="fas fa-user-plus"></i>
          Sign Up
        </button>
      </div>

      <button id="guestBtn" class="guest-btn">
        <i class="fas fa-user-secret" style="margin-right: 8px;"></i> Continue as Guest
      </button>

      <div class="auth-footer">
        <a href="index.html">← Back to Homepage</a>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    (function() {
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const loginBtn = document.getElementById('loginBtn');
      const googleBtn = document.getElementById('googleBtn');
      const signupBtn = document.getElementById('signupBtn');
      const guestBtn = document.getElementById('guestBtn');
      const forgotPassword = document.getElementById('forgotPassword');
      const errorDiv = document.getElementById('error');

      function showError(msg) {
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
        setTimeout(() => {
          errorDiv.style.opacity = 1;
        }, 10);
      }

      function clearError() {
        errorDiv.style.display = 'none';
      }

      loginBtn.addEventListener('click', async () => {
        clearError();
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();
        if (!email || !password) {
          showError('Please enter email and password');
          return;
        }
        loginBtn.disabled = true;
        loginBtn.textContent = 'Signing in...';
        try {
          await firebase.auth().signInWithEmailAndPassword(email, password);
          window.location.href = 'index.html';
        } catch (err) {
          showError(err.message);
          loginBtn.disabled = false;
          loginBtn.textContent = 'Continue';
        }
      });

      googleBtn.addEventListener('click', async () => {
        clearError();
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          await firebase.auth().signInWithPopup(provider);
          window.location.href = 'index.html';
        } catch (err) {
          showError(err.message);
        }
      });

      signupBtn.addEventListener('click', async () => {
        clearError();
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();
        if (!email || !password) {
          showError('Enter email and password to signup');
          return;
        }
        signupBtn.disabled = true;
        try {
          const cred = await firebase.auth().createUserWithEmailAndPassword(email, password);
          await cred.user.sendEmailVerification();
          alert('Verification email sent! Please check your inbox.');
          await firebase.auth().signOut();
          signupBtn.disabled = false;
        } catch (err) {
          showError(err.message);
          signupBtn.disabled = false;
        }
      });

      guestBtn.addEventListener('click', async () => {
        try {
          await firebase.auth().signInAnonymously();
          window.location.href = 'index.html';
        } catch (err) {
          showError(err.message);
        }
      });

      forgotPassword.addEventListener('click', async (e) => {
        e.preventDefault();
        const email = emailInput.value.trim();
        if (!email) {
          showError('Enter your email to reset password');
          return;
        }
        try {
          await firebase.auth().sendPasswordResetEmail(email);
          alert('Check your email for the reset link!');
        } catch (err) {
          showError(err.message);
        }
      });
    })();
  </script>
</body>
</html>
